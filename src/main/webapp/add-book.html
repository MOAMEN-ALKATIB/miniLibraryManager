<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Add Book</title>
    <link style="text/css" rel="stylesheet" href="assets/css/add-book.css">
</head>
<body>
<header>
    <h1>Add Book</h1>
</header>
<main>
  <div id="main">
    <form id="addBook">
        <label for="isbn">Enter the book isbn</label>
        <input id="isbn" placeholder="ISBN"><br>
        <label for="title">Enter the book title</label>
        <input id="title" placeholder="Title"><br>
        <label for="year">Enter the book year</label>
        <input id="year" placeholder="Year"><br>
        <label for="author">Enter the author name</label>
        <input id="author" placeholder="Author"><br>

        <div id="createInputSubmit">
            <button type="button" id="createButton">Create</button>
        </div>
    </form>
  </div>
</main>
<footer>
    <p class="copyright">&copy; Moamen Alkatib</p>
</footer>
<script type="text/javascript" src="assets/js/add-book.js"></script>

</body>
</html>
